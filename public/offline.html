<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cellar offline</title>
    <meta name="theme-color" content="#7e1f3f" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8f5ef;
        color: #191a23;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(90vw, 420px);
        border: 1px solid #d8cfc1;
        border-radius: 8px;
        background: #fff;
        padding: 24px;
        box-shadow: 0 1px 8px rgb(0 0 0 / 0.06);
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      p {
        margin: 12px 0 0;
        color: #5e6270;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>Cellar needs a connection for live cellar data, recommendations, and AI features. Reconnect and try again.</p>
    </main>
  </body>
</html>
